# GitLab CI: compile TypeScript in every immediate subdirectory of the repo root
# that contains both package.json and tsconfig.json (typical layout: foo/, bar/, …).
#
# GitLab’s default config file is ".gitlab-ci.yml". This file is named "gitlab-ci.yml";
# set CI/CD → General pipelines → "CI/CD configuration file" to "gitlab-ci.yml", or rename.
#
# Merge gate: green build + test jobs.

stages:
  - build
  - test
  # - deploy  # optional later (Nexus / Docker push)

variables:
  NODE_VERSION: "20"

build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - |
      set -e
      count=0
      for dir in */; do
        [ -d "$dir" ] || continue
        case "${dir%/}" in
          node_modules) continue ;;
        esac
        if [ -f "${dir}package.json" ] && [ -f "${dir}tsconfig.json" ]; then
          echo "========== BUILD: ${dir%/} =========="
          (
            cd "$dir"
            if [ -f package-lock.json ]; then
              npm ci
            else
              echo "No package-lock.json in ${dir}; using npm install"
              npm install
            fi
            npm run build
          )
          count=$((count + 1))
        fi
      done
      if [ "$count" -eq 0 ]; then
        echo "No root-level subdirectory with both package.json and tsconfig.json; nothing to build."
        exit 1
      fi
      echo "Built ${count} package(s)."

test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  needs:
    - build
  script:
    - |
      set -e
      count=0
      for dir in */; do
        [ -d "$dir" ] || continue
        case "${dir%/}" in node_modules) continue ;; esac
        if [ -f "${dir}package.json" ] && [ -f "${dir}tsconfig.json" ]; then
          echo "========== TEST: ${dir%/} =========="
          (
            cd "$dir"
            if [ -f package-lock.json ]; then npm ci; else npm install; fi
            npm test
          )
          count=$((count + 1))
        fi
      done
      if [ "$count" -eq 0 ]; then
        echo "No package matched for test."
        exit 1
      fi

