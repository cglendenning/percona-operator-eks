<html lang="en">
<head>

  <title>Data platform capabilities</title>
  <style>
    :root {
      --font-sans: Helvetica, "Helvetica Neue", Arial, "Nimbus Sans", sans-serif;
      --bg0: #0c0e14;
      --bg1: #12151f;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-strong: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.1);
      --text: #e8eaef;
      --muted: #9aa3b2;
      --accent: #6ee7ff;
      --accent-dim: rgba(110, 231, 255, 0.15);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      --radius-lg: 20px;
      --radius: 12px;
      --status-green: #4ade80;
      --status-green-bg: rgba(74, 222, 128, 0.2);
      --status-yellow: #fff59a;
      --status-yellow-bg: rgba(255, 245, 154, 0.24);
      --status-red: #ff8585;
      --status-red-bg: rgba(255, 133, 133, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sans);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      color: var(--text);
      background: radial-gradient(1200px 600px at 10% -10%, rgba(110, 231, 255, 0.12), transparent 55%),
        radial-gradient(900px 500px at 90% 0%, rgba(167, 139, 250, 0.1), transparent 50%),
        linear-gradient(165deg, var(--bg0), var(--bg1) 40%, #0a0c12);
      background-attachment: fixed;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    header {
      margin-bottom: 2rem;
      animation: rise 0.7s ease-out both;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    h1 {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: clamp(1.75rem, 3.5vw, 2.35rem);
      line-height: 1.2;
      margin: 0.5rem 0 0.75rem;
      letter-spacing: -0.015em;
    }

    .sub {
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 400;
      max-width: 52ch;
      line-height: 1.55;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      box-shadow: 0 0 12px currentColor;
    }

    .dot.green { color: var(--status-green); background: var(--status-green); }
    .dot.yellow { color: var(--status-yellow); background: var(--status-yellow); }
    .dot.red { color: var(--status-red); background: var(--status-red); }

    .card {
      background: linear-gradient(145deg, var(--surface-strong), var(--surface));
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: rise 0.75s ease-out 0.08s both;
    }

    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9375rem;
      font-weight: 400;
      table-layout: fixed;
    }

    thead th {
      text-align: center;
      padding: 1rem 1.25rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      background: rgba(0, 0, 0, 0.25);
      border-bottom: 1px solid var(--border);
    }

    thead th:first-child,
    td.cap-desc {
      width: 50%;
      box-sizing: border-box;
    }

    thead th:nth-child(2),
    thead th:nth-child(3),
    thead th:nth-child(4),
    tbody td:nth-child(2),
    tbody td:nth-child(3),
    tbody td:nth-child(4) {
      width: calc(50% / 3);
      box-sizing: border-box;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.2s ease;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    td {
      padding: 1.1rem 1.25rem;
      vertical-align: top;
    }

    .cap-desc {
      line-height: 1.5;
      color: var(--text);
      font-weight: 400;
      overflow-wrap: break-word;
      word-wrap: break-word;
    }

    .cap-name {
      font-weight: 600;
      color: var(--text);
    }

    .cap-detail {
      margin: 0.5rem 0 0;
      font-size: 0.875rem;
      line-height: 1.5;
      color: var(--muted);
      font-weight: 400;
    }

    .cell {
      border-radius: var(--radius);
      min-height: 3.5rem;
      padding: 0.75rem 0.85rem;
      border: 1px solid transparent;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cell:hover {
      transform: translateY(-1px);
    }

    .cell.green {
      background: var(--status-green-bg);
      border-color: rgba(74, 222, 128, 0.55);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 0 20px rgba(74, 222, 128, 0.12);
    }

    .cell.yellow {
      background: var(--status-yellow-bg);
      border-color: rgba(255, 245, 154, 0.58);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 0 22px rgba(255, 245, 154, 0.18);
    }

    .cell.red {
      background: var(--status-red-bg);
      border-color: rgba(255, 133, 133, 0.58);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 0 22px rgba(255, 133, 133, 0.18);
    }

    .tickets {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .tickets a {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 0;
      font-size: 0.875rem;
      text-transform: none;
      white-space: nowrap;
      padding: 0.25rem 0.5rem;
      margin: -0.25rem -0.5rem;
      border-radius: 8px;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .tickets a:hover {
      background: var(--accent-dim);
      color: #b8f4ff;
    }

    .tickets a::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 2px;
      background: currentColor;
      opacity: 0.7;
    }

    .empty {
      color: var(--muted);
      font-size: 0.875rem;
      font-style: italic;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }

    .load-err {
      display: none;
      margin-bottom: 1rem;
      padding: 0.85rem 1rem;
      border-radius: var(--radius);
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fecaca;
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0;
    }

    .load-err.visible {
      display: block;
    }
  </style>
</head>

          const key = t.trim();
          const sep = baseUrl.endsWith("/") ? "" : "/";
          return { key, url: baseUrl ? baseUrl + sep + encodeURIComponent(key) : "#" };
        }
        if (t && typeof t === "object" && t.key) {
          const key = String(t.key);
          let url = t.url;
          if (!url && baseUrl) {
            const sep = baseUrl.endsWith("/") ? "" : "/";
            url = baseUrl + sep + encodeURIComponent(key);
          }
          return { key, url: url || "#" };
        }
        return null;
      }

      function normalizePhase(phase, baseUrl) {
        const status = VALID.has(phase && phase.status) ? phase.status : "yellow";
        const raw = Array.isArray(phase && phase.tickets) ? phase.tickets : [];
        const tickets = raw.map(function (x) {
          return normalizeTicket(x, baseUrl);
        }).filter(Boolean);
        return { status: status, tickets: tickets };
      }

      function normalizeRow(row, baseUrl) {
        var name = "";
        var detail = "";
        if (row.name != null && String(row.name).trim() !== "") {
          name = String(row.name).trim();
          detail = row.description != null ? String(row.description).trim() : "";
        } else if (row.description != null && String(row.description).trim() !== "") {
          name = String(row.description).trim();
          detail = "";
        } else {
          name = "—";
          detail = "";
        }
        return {
          name: name,
          detail: detail,
          design: normalizePhase(row.design, baseUrl),
          develop: normalizePhase(row.develop, baseUrl),
          operations: normalizePhase(row.operations, baseUrl)
        };
      }

      function renderTickets(tickets) {
        if (!tickets.length) {
          return '<span class="empty">No tickets</span>';
        }
        var items = tickets.map(function (t) {
          return (
            '<li><a href="' +
            escapeAttr(t.url) +
            '" target="_blank" rel="noopener noreferrer">' +
            escapeHtml(t.key) +
            "</a></li>"
          );
        });
        return '<ul class="tickets">' + items.join("") + "</ul>";
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function escapeAttr(s) {
        return escapeHtml(s).replace(/'/g, "&#39;");
      }

      function render(data) {
        var baseUrl = (data.jiraBaseUrl || "").trim();
        var rows = Array.isArray(data.capabilities) ? data.capabilities : [];
        var body = document.getElementById("cap-body");
        body.innerHTML = rows
          .map(function (raw) {
            var row = normalizeRow(raw, baseUrl);
            var capHtml =
              '<div class="cap-name">' +
              escapeHtml(row.name) +
              "</div>" +
              (row.detail
                ? '<p class="cap-detail">' + escapeHtml(row.detail) + "</p>"
                : "");
            return (
              "<tr>" +
              '<td class="cap-desc">' +
              capHtml +
              "</td>" +
              '<td><div class="cell ' +
              escapeAttr(row.design.status) +
              '">' +
              renderTickets(row.design.tickets) +
              "</div></td>" +
              '<td><div class="cell ' +
              escapeAttr(row.develop.status) +
              '">' +
              renderTickets(row.develop.tickets) +
              "</div></td>" +
              '<td><div class="cell ' +
              escapeAttr(row.operations.status) +
              '">' +
              renderTickets(row.operations.tickets) +
              "</div></td>" +
              "</tr>"
            );
          })
          .join("");
      }

      function showErr(msg) {
        var el = document.getElementById("load-err");
        el.textContent = msg;
        el.classList.add("visible");
      }

      function loadEmbedded() {
        var el = document.getElementById("embedded-capabilities");
        return JSON.parse(el.textContent);
      }

      fetch("capabilities.json")
        .then(function (r) {
          if (!r.ok) throw new Error("Could not load capabilities.json (" + r.status + ")");
          return r.json();
        })
        .then(render)
        .catch(function () {
          try {
            render(loadEmbedded());
            showErr("Using embedded sample data (open via a local web server to load capabilities.json).");
          } catch (e) {
            showErr("Failed to parse data.");
          }
        });
    })();
  </script>
</body>
</html>
