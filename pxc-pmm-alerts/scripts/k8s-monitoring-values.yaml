# DEPRECATED: use nix-rendered values from k8s-monitoring-helm-values.nix (includes KSM
# customResourceState config). Kept as a structural reference only.
#
#   nix-build -E '
#     let pkgs = import <nixpkgs> {}; lib = pkgs.lib;
#         render = import ./k8s-monitoring-helm-values.nix { inherit (pkgs) lib pkgs; };
#     in render.mkValuesYaml { pmmWriteUrl = "..."; k8sClusterId = "..."; }
#   ' --no-out-link
#
# Percona pin: k8s-monitoring v0.1.1 / chart 0.30.3
# https://docs.percona.com/percona-operator-for-mysql/pxc/monitor-kubernetes.html

externalVM:
  read:
    url: ""
  write:
    url: ""
    bearerTokenSecret:
      name: pmm-service-account-token
      key: pmmservertoken

vmsingle:
  enabled: false

vmcluster:
  enabled: false

prometheus-node-exporter:
  enabled: false

vmagent:
  enabled: true
  spec:
    externalLabels:
      k8s_cluster_id: ""

kube-state-metrics:
  enabled: true
  customResourceState:
    enabled: true
    config: {} # must be populated from ksm-configmap.nix — use k8s-monitoring-helm-values.nix
  rbac:
    extraRules:
      - apiGroups: ["apiextensions.k8s.io"]
        resources: ["customresourcedefinitions"]
        verbs: ["list", "watch"]
      - apiGroups: ["pxc.percona.com"]
        resources:
          - perconaxtradbclusters
          - perconaxtradbclusters/status
          - perconaxtradbclusterbackups
          - perconaxtradbclusterbackups/status
          - perconaxtradbclusterrestores
          - perconaxtradbclusterrestores/status
        verbs: ["list", "watch"]
  vmScrape:
    enabled: true
