# Fluentd in_forward (24224) for SeaweedFS S3 filer.s3.auditLogConfig (k3d e2e only).
# SeaweedFS sends the same wire format the wiki documents for Logstash (codec => fluent);
# Fluent Bit's forward input often does not accept that stream, so we use official Fluentd.
# Namespace: k3d-e2e.sh s/__WORM_E2E_NAMESPACE__/<ns>/g
apiVersion: v1
kind: ConfigMap
metadata:
  name: worm-s3-audit-fluentd-config
  namespace: __WORM_E2E_NAMESPACE__
data:
  fluent.conf: |
    <source>
      @type forward
      port 24224
      bind 0.0.0.0
    </source>
    <match **>
      @type stdout
    </match>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worm-s3-audit-fluent
  namespace: __WORM_E2E_NAMESPACE__
  labels:
    app: worm-s3-audit-fluent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worm-s3-audit-fluent
  template:
    metadata:
      labels:
        app: worm-s3-audit-fluent
    spec:
      containers:
        - name: fluentd
          image: fluent/fluentd:v1.16-debian-1
          # K8s must invoke fluentd directly; the image default CMD/ENTRYPOINT would mangle args.
          command: [ "fluentd" ]
          args: [ "-c", "/fluentd/etc/fluent.conf", "-v" ]
          ports:
            - name: forward
              containerPort: 24224
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /fluentd/etc/fluent.conf
              subPath: fluent.conf
      volumes:
        - name: config
          configMap:
            name: worm-s3-audit-fluentd-config
---
apiVersion: v1
kind: Service
metadata:
  name: worm-s3-audit-fluent
  namespace: __WORM_E2E_NAMESPACE__
spec:
  selector:
    app: worm-s3-audit-fluent
  ports:
    - name: forward
      port: 24224
      targetPort: 24224
